# ============================================================
# GitHub Actions: Auto Deploy to Nginx Server (Self-hosted Runner)
# ============================================================
# เมื่อ push หรือ merge เข้า main → runner บนเซิร์ฟเวอร์จะ pull อัตโนมัติ
#
# *** ใช้ self-hosted runner ***
# runner ติดตั้งบนเซิร์ฟเวอร์ Ubuntu โดยตรง
# มันจะ connect ออกไป GitHub เอง (ไม่ต้องมี public IP)
# ============================================================

name: 🚀 Deploy to Nginx Server

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  deploy:
    # รันเฉพาะเมื่อ push เข้า main หรือ PR ถูก merge (ไม่ใช่แค่ปิด)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: self-hosted
    name: 🍗 Deploy Chicken Shop

    steps:
      - name: 📋 แสดงข้อมูล commit
        run: |
          echo "🔄 Deploying commit: ${{ github.sha }}"
          echo "📝 Message: ${{ github.event.head_commit.message }}"
          echo "👤 By: ${{ github.actor }}"

      - name: 🚀 Pull โค้ดล่าสุดและ Deploy
        run: |
          echo "🚀 เริ่ม deploy Chicken Shop..."

          cd /var/www/html

          # ดึงโค้ดล่าสุดจาก GitHub
          git fetch origin
          git reset --hard origin/main

          echo "✅ Deploy สำเร็จ!"
