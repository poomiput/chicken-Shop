# ============================================================
# GitHub Actions: Auto Deploy to Nginx Server
# ============================================================
# เมื่อ push หรือ merge เข้า main → SSH ไปที่เซิร์ฟเวอร์แล้ว pull อัตโนมัติ
#
# *** ตั้งค่า Secrets ที่ GitHub ***
# ไปที่ Repository → Settings → Secrets and variables → Actions → New repository secret
# เพิ่ม secrets ต่อไปนี้:
#   - SERVER_HOST     : IP ของเซิร์ฟเวอร์ (เช่น 192.168.1.100)
#   - SERVER_USER     : username สำหรับ SSH (เช่น ubuntu)
#   - SERVER_SSH_KEY  : private key สำหรับ SSH (เช่น เนื้อหาไฟล์ id_rsa)
# ============================================================

name: 🚀 Deploy to Nginx Server

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  deploy:
    # รันเฉพาะเมื่อ push เข้า main หรือ PR ถูก merge (ไม่ใช่แค่ปิด)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    name: 🍗 Deploy Chicken Shop

    steps:
      - name: 📋 แสดงข้อมูล commit
        run: |
          echo "🔄 Deploying commit: ${{ github.sha }}"
          echo "📝 Message: ${{ github.event.head_commit.message }}"
          echo "👤 By: ${{ github.actor }}"

      - name: 🔑 SSH และ Deploy ไปยังเซิร์ฟเวอร์
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 เริ่ม deploy Chicken Shop..."

            # ตรวจสอบว่ามี repo อยู่แล้วหรือยัง
            if [ -d "/var/www/html/.git" ]; then
              cd /var/www/html
              sudo git pull origin main
            else
              # Clone ใหม่ถ้ายังไม่มี
              sudo rm -rf /var/www/html/*
              sudo git clone https://github.com/${{ github.repository }}.git /var/www/html
            fi

            # ตั้งค่า permission
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            echo "✅ Deploy สำเร็จ!"
